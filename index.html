<style>
  :root {
    --forest: #265a3a;
    --forest-light: #3a7d54;
    --forest-glow: #e8f5ee;
    --sienna: #9c4a2d;
    --sienna-light: #c0714e;
    --gold: #b8942d;
    --gold-light: #d4b44a;
    --gold-bg: #fdf8ec;
    --parchment: #f6f4ed;
    --parchment-deep: #edeadf;
    --ink: #1c1a16;
    --ink-soft: #4a473e;
    --ink-muted: #7a7770;
    --ink-faint: #a8a49a;
    --border: #d8d4c8;
    --border-light: #e8e5da;
    --card: #ffffff;
    --radius: 10px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--parchment);
    color: var(--ink);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;

    body { background: #fff; font-size: 11px; }
    .no-print { display: none !important; }
    .card { box-shadow: none !important; border: 1px solid #ddd !important; break-inside: avoid; }

  ::-webkit-scrollbar { width: 6px; }

  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  .animate-in { animation: fadeUp 0.5s ease-out both; }
  @keyframes slideDown { from { transform: translateY(-100%); opacity:0; } to { transform: translateY(0); opacity:1; } }
  input[type="number"] { -moz-appearance: textfield; }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  /* ─── Install Banner ─── */

  .install-btn {
    background: #fff; color: var(--forest); border: none;
    padding: 8px 22px; border-radius: 8px; font-size: 13px;
    font-weight: 700; cursor: pointer; letter-spacing: 0.3px;

  .dismiss-btn {
    background: none; border: 1px solid rgba(255,255,255,0.35);
    color: rgba(255,255,255,0.85); padding: 8px 16px; border-radius: 8px;

  /* ─── Offline Indicator ─── */

    background: var(--gold); color: #fff;
    padding: 8px 18px; border-radius: 20px;

<div id="root"></div>

<!-- Service Worker Registration & Install Logic -->
<script>
  // Register Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('[PWA] SW registered, scope:', reg.scope))
        .catch(err => console.log('[PWA] SW registration failed:', err));
    });
  }

  // Install prompt
  let deferredPrompt;
  const banner = document.getElementById('install-banner');
  const installBtn = document.getElementById('install-btn');
  const dismissBtn = document.getElementById('dismiss-btn');

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    banner.style.display = 'flex';
  });

  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    console.log('[PWA] Install outcome:', outcome);
    deferredPrompt = null;
    banner.style.display = 'none';
  });

  dismissBtn.addEventListener('click', () => {
    banner.style.display = 'none';
  });

  window.addEventListener('appinstalled', () => {
    banner.style.display = 'none';
    console.log('[PWA] App installed');
  });

  // Offline indicator
  const offBadge = document.getElementById('offline-badge');
  const updateOnline = () => {
    if (!navigator.onLine) offBadge.classList.add('visible');
    else offBadge.classList.remove('visible');
  };
  window.addEventListener('online', updateOnline);
  window.addEventListener('offline', updateOnline);
  updateOnline();
</script>

<script type="text/babel">
const { useState, useMemo } = React;

/* ───────────── Formatting ───────────── */
const fmt = (v) => {
  if (v == null || isNaN(v)) return "$0.00";
  return new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", minimumFractionDigits: 2 }).format(v);
};
const fmtPct = (v) => ((v || 0) * 100).toFixed(3) + "%";

/* ───────────── Calculation Engine ───────────── */
function monthlyPI(principal, annualRate, termMonths) {
  if (principal <= 0 || termMonths <= 0) return 0;
  if (annualRate === 0) return principal / termMonths;
  const r = annualRate / 12;
  return (principal * r * Math.pow(1 + r, termMonths)) / (Math.pow(1 + r, termMonths) - 1);
}

function amortize(principal, annualRate, termMonths, extra) {
  const r = annualRate / 12;
  const basePmt = monthlyPI(principal, annualRate, termMonths);
  let bal = principal;
  const rows = [];
  let totInt = 0, totPrin = 0;
  for (let m = 1; m <= termMonths && bal > 0.005; m++) {
    const intPmt = bal * r;
    let prinPmt = basePmt - intPmt + extra;
    if (prinPmt > bal) prinPmt = bal;
    bal = Math.max(0, bal - prinPmt);
    totInt += intPmt;
    totPrin += prinPmt;
    rows.push({ month: m, payment: intPmt + prinPmt, principal: prinPmt, interest: intPmt, balance: bal, totInt, totPrin });
  }
  return { rows, totalInterest: totInt, totalPrincipal: totPrin, months: rows.length };
}

function findEffectiveRate(principal, targetInterest, termMonths) {
  let lo = 0, hi = 0.5;
  for (let i = 0; i < 80; i++) {
    const mid = (lo + hi) / 2;
    const r = mid / 12;
    if (r === 0) { lo = mid; continue; }
    const pmt = (principal * r * Math.pow(1 + r, termMonths)) / (Math.pow(1 + r, termMonths) - 1);
    const totI = pmt * termMonths - principal;
    if (totI < targetInterest) lo = mid; else hi = mid;
  }
  return (lo + hi) / 2;
}

/* ───────────── Components ───────────── */

function Card({ children, title, subtitle, accent, delay, className }) {
  return (
    <div className={`card animate-in ${className || ''}`} style={{
      background: 'var(--card)', border: '1px solid var(--border-light)',
      borderRadius: 'var(--radius)', padding: '24px 28px',
      boxShadow: 'var(--shadow-sm)', animationDelay: (delay || 0) + 'ms',
    }}>
      {title && (
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: subtitle ? 4 : 18 }}>
          {accent && <div style={{ width: 4, height: 24, borderRadius: 2, background: accent }} />}
          <h2 style={{ fontSize: 18, fontWeight: 700, color: 'var(--ink)', letterSpacing: -0.4 }}>{title}</h2>
        </div>
      )}
      {subtitle && <p style={{ fontSize: 12.5, color: 'var(--ink-muted)', marginBottom: 18, marginLeft: accent ? 14 : 0 }}>{subtitle}</p>}
      {children}
    </div>
  );
}

function InputField({ label, value, onChange, prefix, suffix, step }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 4, flex: 1, minWidth: 110 }}>
      <label style={{ fontSize: 10.5, fontWeight: 700, color: 'var(--ink-muted)', textTransform: 'uppercase', letterSpacing: 1 }}>{label}</label>
      <div style={{
        display: 'flex', alignItems: 'center', gap: 4,
        background: 'var(--parchment)', border: '1.5px solid var(--border)',
        borderRadius: 8, padding: '7px 12px', transition: 'border-color 0.2s',
      }}
        onFocus={e => e.currentTarget.style.borderColor = 'var(--forest)'}
        onBlur={e => e.currentTarget.style.borderColor = 'var(--border)'}
      >
        {prefix && <span style={{ color: 'var(--ink-faint)', fontSize: 14, fontWeight: 600, userSelect: 'none' }}>{prefix}</span>}
        <input type="number" value={value} step={step || "any"}
          onChange={e => onChange(e.target.value === "" ? "" : Number(e.target.value))}
          style={{ border: 'none', outline: 'none', background: 'transparent', fontSize: 15, fontWeight: 600, color: 'var(--ink)', width: '100%', fontFamily: "'DM Sans', sans-serif" }}
        />
        {suffix && <span style={{ color: 'var(--ink-faint)', fontSize: 13, userSelect: 'none' }}>{suffix}</span>}
      </div>
    </div>
  );
}

function StatBox({ label, value, sub, color, large }) {
  return (
    <div style={{ flex: 1, minWidth: large ? 160 : 130, background: 'var(--parchment)', borderRadius: 10, padding: large ? '18px 20px' : '14px 16px', border: '1px solid var(--border-light)' }}>
      <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--ink-faint)', textTransform: 'uppercase', letterSpacing: 0.9, marginBottom: 5 }}>{label}</div>
      <div style={{ fontSize: large ? 28 : 21, fontWeight: 700, color: color || 'var(--ink)', letterSpacing: -0.6, lineHeight: 1.15 }}>{value}</div>
      {sub && <div style={{ fontSize: 11.5, color: 'var(--ink-muted)', marginTop: 4, lineHeight: 1.4 }}>{sub}</div>}
    </div>
  );
}

function DebtRow({ debt, onUpdate, onRemove, idx }) {
  const inputStyle = { border: 'none', outline: 'none', background: 'transparent', fontSize: 14, fontWeight: 500, color: 'var(--ink)', width: '100%', fontFamily: "'DM Sans', sans-serif" };
  const cellWrap = { display: 'flex', alignItems: 'center', gap: 3, background: 'var(--parchment)', border: '1.5px solid var(--border)', borderRadius: 7, padding: '6px 10px' };
  return (
    <div style={{ display: 'flex', gap: 8, alignItems: 'flex-end', flexWrap: 'wrap', padding: '10px 0', borderBottom: '1px solid var(--border-light)' }}>
      <div style={{ width: 26, textAlign: 'center', paddingBottom: 6 }}>
        <span style={{ fontSize: 11, fontWeight: 700, color: 'var(--ink-faint)' }}>{idx}</span>
      </div>
      <div style={{ flex: '2 1 150px', display: 'flex', flexDirection: 'column', gap: 3 }}>
        <label style={{ fontSize: 9.5, fontWeight: 700, color: 'var(--ink-faint)', textTransform: 'uppercase', letterSpacing: 0.8 }}>Creditor</label>
        <input value={debt.name} onChange={e => onUpdate({ ...debt, name: e.target.value })} placeholder="e.g. Visa, Auto Loan..."
          style={{ ...inputStyle, ...cellWrap, padding: '6px 10px', border: '1.5px solid var(--border)', borderRadius: 7 }} />
      </div>
      <div style={{ flex: '1 1 105px', display: 'flex', flexDirection: 'column', gap: 3 }}>
        <label style={{ fontSize: 9.5, fontWeight: 700, color: 'var(--ink-faint)', textTransform: 'uppercase', letterSpacing: 0.8 }}>Balance</label>
        <div style={cellWrap}>
          <span style={{ color: 'var(--ink-faint)', fontSize: 13, fontWeight: 600 }}>$</span>
          <input type="number" value={debt.balance} onChange={e => onUpdate({ ...debt, balance: Number(e.target.value) })} style={inputStyle} />
        </div>
      </div>
      <div style={{ flex: '1 1 105px', display: 'flex', flexDirection: 'column', gap: 3 }}>
        <label style={{ fontSize: 9.5, fontWeight: 700, color: 'var(--ink-faint)', textTransform: 'uppercase', letterSpacing: 0.8 }}>Mo. Payment</label>
        <div style={cellWrap}>
          <span style={{ color: 'var(--ink-faint)', fontSize: 13, fontWeight: 600 }}>$</span>
          <input type="number" value={debt.payment} onChange={e => onUpdate({ ...debt, payment: Number(e.target.value) })} style={inputStyle} />
        </div>
      </div>
      <div style={{ flex: '0 1 85px', display: 'flex', flexDirection: 'column', gap: 3 }}>
        <label style={{ fontSize: 9.5, fontWeight: 700, color: 'var(--ink-faint)', textTransform: 'uppercase', letterSpacing: 0.8 }}>APR</label>
        <div style={cellWrap}>
          <input type="number" step="0.1" value={debt.rate} onChange={e => onUpdate({ ...debt, rate: Number(e.target.value) })} style={inputStyle} />
          <span style={{ color: 'var(--ink-faint)', fontSize: 13 }}>%</span>
        </div>
      </div>
      <button onClick={onRemove} title="Remove" className="no-print" style={{
        background: 'none', border: 'none', cursor: 'pointer', color: 'var(--sienna)',
        fontSize: 20, fontWeight: 700, lineHeight: 1, padding: '4px 6px', marginBottom: 4,
        opacity: 0.6, transition: 'opacity 0.15s',
      }}
        onMouseEnter={e => e.currentTarget.style.opacity = 1}
        onMouseLeave={e => e.currentTarget.style.opacity = 0.6}
      >×</button>
    </div>
  );
}

/* ───────────── Charts ───────────── */
function CostBar({ principal, interest, saved }) {
  const total = principal + interest + saved;
  if (total === 0) return null;
  const segments = [
    { pct: (principal / total) * 100, color: 'var(--forest)', label: 'Principal', val: principal },
    { pct: (interest / total) * 100, color: 'var(--sienna)', label: 'Interest Paid', val: interest },
  ];
  if (saved / total > 0.003) segments.push({ pct: (saved / total) * 100, color: 'var(--gold)', label: 'Interest Saved', val: saved });

  return (
    <div>
      <div style={{ display: 'flex', height: 40, borderRadius: 10, overflow: 'hidden', border: '1px solid var(--border)' }}>
        {segments.map((s, i) => (
          <div key={i} style={{ width: s.pct + '%', background: s.color, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 11, fontWeight: 600, transition: 'width 0.5s ease' }}>
            {s.pct > 14 && s.pct.toFixed(1) + '%'}
          </div>
        ))}
      </div>
      <div style={{ display: 'flex', gap: 20, marginTop: 10, flexWrap: 'wrap' }}>
        {segments.map((s, i) => (
          <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 12, color: 'var(--ink-soft)' }}>
            <span style={{ width: 10, height: 10, borderRadius: 3, background: s.color, display: 'inline-block', flexShrink: 0 }} />
            <span style={{ fontWeight: 600 }}>{s.label}</span>
            <span style={{ color: 'var(--ink-muted)' }}>{fmt(s.val)}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function BalanceChart({ stdRows, extRows, termMonths }) {
  if (!stdRows.length) return null;
  const W = 640, H = 240, PL = 56, PB = 36, PT = 14, PR = 14;
  const maxBal = stdRows[0]?.balance || 1;
  const maxM = termMonths;
  const xc = m => PL + (m / maxM) * (W - PL - PR);
  const yc = b => PT + (1 - b / maxBal) * (H - PT - PB);
  const samp = Math.max(1, Math.floor(stdRows.length / 100));
  const mkPath = (rows) => rows.filter((_, i) => i % samp === 0 || i === rows.length - 1)
    .map((r, i) => `${i === 0 ? 'M' : 'L'}${xc(r.month).toFixed(1)},${yc(r.balance).toFixed(1)}`).join(' ');
  const pathStd = mkPath(stdRows);
  const pathExt = mkPath(extRows);
  const areaExt = pathExt + ` L${xc(extRows[extRows.length - 1].month).toFixed(1)},${yc(0).toFixed(1)} L${PL},${yc(0).toFixed(1)} Z`;
  const yTicks = [0, 0.25, 0.5, 0.75, 1].map(f => f * maxBal);
  const xYears = [];
  for (let yr = 0; yr <= Math.ceil(maxM / 12); yr += 5) xYears.push(yr * 12);

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', maxWidth: 660, display: 'block' }}>
      <defs>
        <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="var(--forest)" stopOpacity="0.12" />
          <stop offset="100%" stopColor="var(--forest)" stopOpacity="0.02" />
        </linearGradient>
      </defs>
      {yTicks.map((v, i) => (
        <g key={i}>
          <line x1={PL} y1={yc(v)} x2={W - PR} y2={yc(v)} stroke="var(--border-light)" strokeWidth={0.8} />
          <text x={PL - 8} y={yc(v) + 4} textAnchor="end" fontSize={9.5} fill="var(--ink-faint)" fontFamily="DM Sans">
            {v >= 1000 ? '$' + (v / 1000).toFixed(0) + 'k' : '$' + v.toFixed(0)}
          </text>
        </g>
      ))}
      {xYears.map((m, i) => (
        <text key={i} x={xc(m)} y={H - 8} textAnchor="middle" fontSize={9.5} fill="var(--ink-faint)" fontFamily="DM Sans">Yr {m / 12}</text>
      ))}
      <path d={areaExt} fill="url(#areaGrad)" />
      <path d={pathStd} fill="none" stroke="var(--sienna-light)" strokeWidth={2.2} opacity={0.55} strokeDasharray="6 3" />
      <path d={pathExt} fill="none" stroke="var(--forest)" strokeWidth={2.8} />
      {extRows.length < stdRows.length && (
        <g>
          <line x1={xc(extRows[extRows.length - 1].month)} y1={PT} x2={xc(extRows[extRows.length - 1].month)} y2={yc(0)} stroke="var(--forest)" strokeWidth={1.2} strokeDasharray="4 3" opacity={0.5} />
          <text x={xc(extRows[extRows.length - 1].month)} y={PT + 10} textAnchor="middle" fontSize={9} fill="var(--forest)" fontWeight="600" fontFamily="DM Sans">Paid off!</text>
        </g>
      )}
      <g transform={`translate(${W - 180}, ${PT + 4})`}>
        <line x1={0} y1={0} x2={20} y2={0} stroke="var(--sienna-light)" strokeWidth={2} strokeDasharray="6 3" opacity={0.55} />
        <text x={24} y={4} fontSize={10} fill="var(--ink-muted)" fontFamily="DM Sans">Standard Payoff</text>
        <line x1={0} y1={18} x2={20} y2={18} stroke="var(--forest)" strokeWidth={2.8} />
        <text x={24} y={22} fontSize={10} fill="var(--ink-muted)" fontFamily="DM Sans">With Extra Payments</text>
      </g>
    </svg>
  );
}

/* ───────────── Main App ───────────── */
function App() {
  const [homeVal, setHomeVal] = useState(400000);
  const [loanAmt, setLoanAmt] = useState(300000);
  const [rate, setRate] = useState(6.75);
  const [termYrs, setTermYrs] = useState(30);
  const [annTax, setAnnTax] = useState(3600);
  const [annIns, setAnnIns] = useState(1500);
  const [moMI, setMoMI] = useState(0);
  const [extraPmt, setExtraPmt] = useState(0);
  const [debts, setDebts] = useState([
    { id: 1, name: "Visa Credit Card", balance: 8500, payment: 250, rate: 22.99 },
    { id: 2, name: "Auto Loan", balance: 15000, payment: 420, rate: 7.5 },
    { id: 3, name: "Student Loan", balance: 12000, payment: 180, rate: 5.8 },
  ]);
  const [nextId, setNextId] = useState(4);
  const [showAmort, setShowAmort] = useState(false);
  const [applyDebtSav, setApplyDebtSav] = useState(true);

  const addDebt = () => { setDebts([...debts, { id: nextId, name: "", balance: 0, payment: 0, rate: 0 }]); setNextId(nextId + 1); };
  const rmDebt = (id) => setDebts(debts.filter(d => d.id !== id));
  const updDebt = (id, u) => setDebts(debts.map(d => d.id === id ? u : d));

  const totDebtBal = debts.reduce((s, d) => s + (d.balance || 0), 0);
  const totDebtPmt = debts.reduce((s, d) => s + (d.payment || 0), 0);
  const wtdDebtAPR = totDebtBal > 0 ? debts.reduce((s, d) => s + (d.balance || 0) * (d.rate || 0), 0) / totDebtBal : 0;

  const R = useMemo(() => {
    const principal = (loanAmt || 0) + totDebtBal;
    const ar = (rate || 0) / 100;
    const tm = (termYrs || 30) * 12;
    const mTax = (annTax || 0) / 12;
    const mIns = (annIns || 0) / 12;
    const mMI = moMI || 0;
    const basePI = monthlyPI(principal, ar, tm);
    const totalPITI = basePI + mTax + mIns + mMI;
    const debtSav = totDebtPmt;
    const totalExtra = (extraPmt || 0) + (applyDebtSav ? debtSav : 0);
    const stdA = amortize(principal, ar, tm, 0);
    const extA = amortize(principal, ar, tm, totalExtra);
    const intSaved = stdA.totalInterest - extA.totalInterest;
    const moSaved = stdA.months - extA.months;
    const effRate = totalExtra > 0 ? findEffectiveRate(principal, extA.totalInterest, tm) : ar;
    return { principal, basePI, totalPITI, debtSav, totalExtra, stdA, extA, intSaved, moSaved, effRate, ar, tm, mTax, mIns, mMI };
  }, [loanAmt, rate, termYrs, annTax, annIns, moMI, extraPmt, debts, applyDebtSav, totDebtBal, totDebtPmt]);

  const yrSaved = Math.floor(R.moSaved / 12);
  const moSavedRem = R.moSaved % 12;
  const extPayoffYr = Math.floor(R.extA.months / 12);
  const extPayoffMo = R.extA.months % 12;

  return (
    <div style={{ maxWidth: 940, margin: '0 auto', padding: '24px 16px 72px' }}>

      {/* ─── HEADER ─── */}
      <header className="animate-in" style={{ textAlign: 'center', marginBottom: 32 }}>
        <div style={{ display: 'inline-flex', alignItems: 'center', gap: 12, marginBottom: 8 }}>
          <div style={{
            width: 42, height: 42, borderRadius: 10,
            background: 'linear-gradient(135deg, var(--forest), var(--forest-light))',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            boxShadow: '0 2px 10px rgba(38,90,58,0.25)',
          }}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
          </div>
          <h1 style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 32, fontWeight: 800, color: 'var(--ink)', letterSpacing: -0.8, lineHeight: 1.1 }}>
            Mortgage Refinance<br/><span style={{ color: 'var(--forest)', fontSize: 26 }}>Analyzer</span>
          </h1>
        </div>
        <p style={{ fontSize: 13.5, color: 'var(--ink-muted)', maxWidth: 560, margin: '4px auto 0' }}>
          See the bigger picture. Consolidate high-interest debts into your mortgage, free up monthly cash flow, and use those savings to pay your home off faster.
        </p>
      </header>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>

        {/* ─── LOAN DETAILS ─── */}
        <Card title="New Loan Details" accent="var(--forest)" delay={50}>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 12 }}>
            <InputField label="Home Value" value={homeVal} onChange={setHomeVal} prefix="$" />
            <InputField label="New Loan Amount" value={loanAmt} onChange={setLoanAmt} prefix="$" />
            <InputField label="Interest Rate" value={rate} onChange={setRate} suffix="%" step="0.125" />
            <InputField label="Loan Term" value={termYrs} onChange={setTermYrs} suffix="yrs" />
          </div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 12, marginTop: 14 }}>
            <InputField label="Annual Property Taxes" value={annTax} onChange={setAnnTax} prefix="$" />
            <InputField label="Annual Homeowners Ins." value={annIns} onChange={setAnnIns} prefix="$" />
            <InputField label="Monthly Mortgage Ins." value={moMI} onChange={setMoMI} prefix="$" />
            <InputField label="Add'l Extra Payment" value={extraPmt} onChange={setExtraPmt} prefix="$" />
          </div>
        </Card>

        {/* ─── DEBTS ─── */}
        <Card title="Debts to Consolidate" subtitle="List each debt from the credit report that will be rolled into the new mortgage." accent="var(--sienna)" delay={100}>
          <div style={{ display: 'flex', flexDirection: 'column' }}>
            {debts.map((d, i) => (
              <DebtRow key={d.id} debt={d} idx={i + 1} onUpdate={u => updDebt(d.id, u)} onRemove={() => rmDebt(d.id)} />
            ))}
          </div>
          <button onClick={addDebt} className="no-print" style={{
            marginTop: 14, background: 'none', border: '1.5px dashed var(--border)',
            borderRadius: 8, padding: '9px 22px', cursor: 'pointer',
            fontSize: 13, fontWeight: 700, color: 'var(--ink-muted)', letterSpacing: 0.3, transition: 'all 0.2s',
          }}
            onMouseEnter={e => { e.currentTarget.style.borderColor = 'var(--sienna)'; e.currentTarget.style.color = 'var(--sienna)'; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--border)'; e.currentTarget.style.color = 'var(--ink-muted)'; }}
          >+ Add Debt</button>

          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 16, marginTop: 18, padding: '16px 18px', background: 'var(--parchment)', borderRadius: 10, border: '1px solid var(--border-light)' }}>
            <div style={{ flex: 1, minWidth: 130 }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--ink-faint)', textTransform: 'uppercase', letterSpacing: 0.8 }}>Total Debt Balances</div>
              <div style={{ fontSize: 22, fontWeight: 700, color: 'var(--sienna)', marginTop: 3 }}>{fmt(totDebtBal)}</div>
            </div>
            <div style={{ flex: 1, minWidth: 130 }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--ink-faint)', textTransform: 'uppercase', letterSpacing: 0.8 }}>Current Monthly Pmts</div>
              <div style={{ fontSize: 22, fontWeight: 700, color: 'var(--sienna)', marginTop: 3 }}>{fmt(totDebtPmt)}<span style={{ fontSize: 12, fontWeight: 500, color: 'var(--ink-muted)' }}>/mo</span></div>
            </div>
            <div style={{ flex: 1, minWidth: 130 }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--ink-faint)', textTransform: 'uppercase', letterSpacing: 0.8 }}>Wtd. Avg APR on Debts</div>
              <div style={{ fontSize: 22, fontWeight: 700, color: 'var(--sienna)', marginTop: 3 }}>{wtdDebtAPR.toFixed(2)}%</div>
            </div>
            <div style={{ flex: 1, minWidth: 130 }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--ink-faint)', textTransform: 'uppercase', letterSpacing: 0.8 }}>New Loan (incl. debts)</div>
              <div style={{ fontSize: 22, fontWeight: 700, color: 'var(--forest)', marginTop: 3 }}>{fmt(R.principal)}</div>
            </div>
          </div>
        </Card>

        {/* ─── MONTHLY PAYMENT OVERVIEW ─── */}
        <Card title="Monthly Payment Overview" accent="var(--gold)" delay={150}>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 12 }}>
            <StatBox label="Principal & Interest" value={fmt(R.basePI)} large />
            <StatBox label="Taxes + Insurance + MI" value={fmt(R.mTax + R.mIns + R.mMI)}
              sub={`Tax ${fmt(R.mTax)} · Ins ${fmt(R.mIns)}${R.mMI > 0 ? ` · MI ${fmt(R.mMI)}` : ''}`} />
            <StatBox label="Total Monthly (PITI)" value={fmt(R.totalPITI)} color="var(--forest)" large />
          </div>

          {/* Savings callout */}
          <div style={{
            marginTop: 18, padding: '20px 22px',
            background: 'linear-gradient(135deg, var(--forest-glow), var(--parchment))',
            borderRadius: 12, border: '1.5px solid #c2dbc9',
          }}>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 24, alignItems: 'center' }}>
              <div style={{ flex: '1 1 240px' }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--forest)', textTransform: 'uppercase', letterSpacing: 1 }}>Monthly Savings from Debt Consolidation</div>
                <div style={{ fontSize: 36, fontWeight: 800, color: 'var(--forest)', marginTop: 6, letterSpacing: -1 }}>
                  {fmt(R.debtSav)}<span style={{ fontSize: 15, fontWeight: 500, color: 'var(--ink-muted)' }}>/mo</span>
                </div>

                {/* Yearly savings badge */}
                <div style={{
                  display: 'inline-flex', alignItems: 'center', gap: 8,
                  marginTop: 8, padding: '8px 16px',
                  background: 'rgba(38, 90, 58, 0.08)',
                  borderRadius: 8, border: '1px solid rgba(38, 90, 58, 0.15)',
                }}>
                  <span style={{ fontSize: 11, fontWeight: 700, color: 'var(--forest)', textTransform: 'uppercase', letterSpacing: 0.8 }}>Yearly Savings</span>
                  <span style={{ fontSize: 24, fontWeight: 800, color: 'var(--forest)', letterSpacing: -0.5 }}>{fmt(R.debtSav * 12)}</span>
                  <span style={{ fontSize: 12, fontWeight: 500, color: 'var(--ink-muted)' }}>/yr</span>
                </div>

                <div style={{ fontSize: 12.5, color: 'var(--ink-muted)', marginTop: 6 }}>
                  What you were paying monthly on debts — now eliminated
                </div>
              </div>
              <div style={{ flex: '1 1 200px' }}>
                <label style={{ display: 'flex', alignItems: 'flex-start', gap: 10, cursor: 'pointer' }} className="no-print">
                  <input type="checkbox" checked={applyDebtSav} onChange={e => setApplyDebtSav(e.target.checked)}
                    style={{ width: 20, height: 20, accentColor: 'var(--forest)', marginTop: 2, flexShrink: 0 }} />
                  <span>
                    <span style={{ fontSize: 14, fontWeight: 700, color: 'var(--ink)' }}>Re-invest savings as extra mortgage payment</span><br />
                    <span style={{ fontSize: 12, color: 'var(--ink-muted)' }}>
                      Total extra applied: <strong style={{ color: 'var(--forest)' }}>{fmt(R.totalExtra)}</strong>/mo
                      {R.totalExtra > 0 && applyDebtSav && extraPmt > 0 && (
                        <span> ({fmt(R.debtSav)} savings + {fmt(extraPmt)} extra)</span>
                      )}
                    </span>
                  </span>
                </label>
              </div>
            </div>
          </div>
        </Card>

        {/* ─── EFFECTIVE RATE & SAVINGS ─── */}
        <Card title="Interest Savings & Effective Rate" accent="var(--forest)" delay={200}>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 12 }}>
            <StatBox label="Effective Rate" value={fmtPct(R.effRate)}
              sub={`Your ${rate}% note rate effectively behaves like ${fmtPct(R.effRate)} when you apply ${fmt(R.totalExtra)}/mo extra — because you'll pay far less total interest.`}
              color="var(--forest)" large />
            <StatBox label="Total Interest Saved" value={fmt(R.intSaved)}
              sub={R.totalExtra > 0 ? `Compared to minimum payments over ${termYrs} years` : "Add extra payments to see savings"}
              color="var(--gold)" large />
            <StatBox label="Payoff Accelerated By" value={R.moSaved > 0 ? `${yrSaved}yr ${moSavedRem}mo` : "—"}
              sub={R.totalExtra > 0 ? `Mortgage paid in ${extPayoffYr}yr ${extPayoffMo}mo instead of ${termYrs}yr` : ""}
              color="var(--sienna)" large />
          </div>

          <div style={{ marginTop: 24 }}>
            <h3 style={{ fontSize: 12, fontWeight: 700, color: 'var(--ink-muted)', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 12 }}>Total Loan Cost Breakdown</h3>
            <CostBar principal={R.principal} interest={R.extA.totalInterest} saved={R.intSaved} />
          </div>

          <div style={{ marginTop: 28 }}>
            <h3 style={{ fontSize: 12, fontWeight: 700, color: 'var(--ink-muted)', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 12 }}>Balance Over Time</h3>
            <BalanceChart stdRows={R.stdA.rows} extRows={R.extA.rows} termMonths={R.tm} />
          </div>

          {/* Side-by-side comparison */}
          <div style={{ marginTop: 24, overflowX: 'auto' }}>
            <h3 style={{ fontSize: 12, fontWeight: 700, color: 'var(--ink-muted)', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 12 }}>Side-by-Side Comparison</h3>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
              <thead>
                <tr style={{ borderBottom: '2px solid var(--border)' }}>
                  <th style={{ padding: '8px 12px', textAlign: 'left', fontWeight: 700, fontSize: 11, color: 'var(--ink-muted)', textTransform: 'uppercase', letterSpacing: 0.6 }}></th>
                  <th style={{ padding: '8px 12px', textAlign: 'right', fontWeight: 700, fontSize: 11, color: 'var(--sienna)', textTransform: 'uppercase' }}>Minimum Only</th>
                  <th style={{ padding: '8px 12px', textAlign: 'right', fontWeight: 700, fontSize: 11, color: 'var(--forest)', textTransform: 'uppercase' }}>With Extra</th>
                  <th style={{ padding: '8px 12px', textAlign: 'right', fontWeight: 700, fontSize: 11, color: 'var(--gold)', textTransform: 'uppercase' }}>Difference</th>
                </tr>
              </thead>
              <tbody>
                {[
                  ["Monthly Payment", fmt(R.basePI), fmt(R.basePI + R.totalExtra), fmt(R.totalExtra)],
                  ["Total Interest", fmt(R.stdA.totalInterest), fmt(R.extA.totalInterest), fmt(R.intSaved)],
                  ["Total Cost", fmt(R.principal + R.stdA.totalInterest), fmt(R.principal + R.extA.totalInterest), fmt(R.intSaved)],
                  ["Payoff Time", `${termYrs}yr 0mo`, `${extPayoffYr}yr ${extPayoffMo}mo`, R.moSaved > 0 ? `${yrSaved}yr ${moSavedRem}mo earlier` : "—"],
                ].map((row, i) => (
                  <tr key={i} style={{ borderBottom: '1px solid var(--border-light)', background: i % 2 === 0 ? 'var(--parchment)' : 'transparent' }}>
                    <td style={{ padding: '9px 12px', fontWeight: 600, color: 'var(--ink-soft)' }}>{row[0]}</td>
                    <td style={{ padding: '9px 12px', textAlign: 'right', color: 'var(--sienna)', fontWeight: 500 }}>{row[1]}</td>
                    <td style={{ padding: '9px 12px', textAlign: 'right', color: 'var(--forest)', fontWeight: 600 }}>{row[2]}</td>
                    <td style={{ padding: '9px 12px', textAlign: 'right', color: 'var(--gold)', fontWeight: 700 }}>{row[3]}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </Card>

        {/* ─── AMORTIZATION ─── */}
        <Card title="Full Amortization Schedule" accent="var(--ink-faint)" delay={250}>
          <button onClick={() => setShowAmort(!showAmort)} className="no-print" style={{
            background: showAmort ? 'var(--forest)' : 'var(--parchment)',
            color: showAmort ? '#fff' : 'var(--forest)',
            border: '1.5px solid var(--forest)', borderRadius: 8,
            padding: '9px 24px', cursor: 'pointer', fontSize: 13, fontWeight: 700, letterSpacing: 0.3, transition: 'all 0.25s',
          }}>
            {showAmort ? 'Hide Schedule ▲' : 'Show Month-by-Month Schedule ▼'}
          </button>

          {showAmort && (
            <div style={{ marginTop: 16, maxHeight: 480, overflowY: 'auto', border: '1px solid var(--border)', borderRadius: 8 }}>
              <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
                <thead>
                  <tr style={{ background: 'var(--parchment-deep)', position: 'sticky', top: 0, zIndex: 2 }}>
                    {['Mo.', 'Payment', 'Principal', 'Interest', 'Extra', 'Balance'].map(h => (
                      <th key={h} style={{ padding: '9px 10px', textAlign: 'right', fontWeight: 700, color: 'var(--ink-muted)', textTransform: 'uppercase', fontSize: 10, letterSpacing: 0.7, borderBottom: '2px solid var(--border)' }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {R.extA.rows.map((r, i) => {
                    const basePrin = R.basePI - r.interest;
                    const extraApplied = r.principal - Math.max(0, basePrin);
                    const isYr = r.month % 12 === 0;
                    return (
                      <tr key={r.month} style={{ background: isYr ? '#f0eddf' : (i % 2 === 0 ? '#fff' : 'var(--parchment)'), borderBottom: isYr ? '2px solid var(--border)' : 'none' }}>
                        <td style={{ padding: '5px 10px', textAlign: 'right', color: 'var(--ink-faint)', fontWeight: isYr ? 700 : 500 }}>{isYr ? `Yr ${r.month / 12}` : r.month}</td>
                        <td style={{ padding: '5px 10px', textAlign: 'right', fontWeight: 500 }}>{fmt(r.payment)}</td>
                        <td style={{ padding: '5px 10px', textAlign: 'right', color: 'var(--forest)', fontWeight: 500 }}>{fmt(Math.max(0, basePrin))}</td>
                        <td style={{ padding: '5px 10px', textAlign: 'right', color: 'var(--sienna)', fontWeight: 500 }}>{fmt(r.interest)}</td>
                        <td style={{ padding: '5px 10px', textAlign: 'right', color: 'var(--gold)', fontWeight: 600 }}>{extraApplied > 0.01 ? fmt(extraApplied) : '—'}</td>
                        <td style={{ padding: '5px 10px', textAlign: 'right', fontWeight: 600 }}>{fmt(r.balance)}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </Card>

        <div style={{ textAlign: 'center', fontSize: 11.5, color: 'var(--ink-faint)', marginTop: 12, lineHeight: 1.7 }}>
          This calculator is for illustrative purposes only and does not constitute a loan commitment or financial advice.<br />
          Actual loan terms, rates, fees, and payments may vary. Please consult your loan officer for a personalized quote.
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
